name: Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: nightscout_tray
  TARGET: x86_64-unknown-linux-gnu

jobs:
  linux-tarball:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Compute artifact version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "value=pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Linux tarball
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          ARCHIVE_ROOT="${APP_NAME}-${VERSION}-${TARGET}"
          mkdir -p "dist/${ARCHIVE_ROOT}"
          cp "target/release/${APP_NAME}" "dist/${ARCHIVE_ROOT}/"
          cp README.md "dist/${ARCHIVE_ROOT}/"
          cp packaging/linux/nightscout-tray.desktop "dist/${ARCHIVE_ROOT}/"
          tar -C dist -czf "dist/${ARCHIVE_ROOT}.tar.gz" "${ARCHIVE_ROOT}"

      - name: Upload Linux tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball-${{ steps.version.outputs.value }}
          path: dist/*.tar.gz
